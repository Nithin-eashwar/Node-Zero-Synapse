name: Synapse CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────
  # Backend: Lint, Test, Docker Build
  # ─────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (syntax check)
        run: python -m py_compile backend/api/main.py

      - name: Import check (all modules load)
        run: |
          python -c "from backend.parsing import parse_file, scan_repository"
          python -c "from backend.graph import CodeGraph, build_dependency_graph"
          python -c "from backend.governance import ArchitectureValidator"
          python -c "from backend.ai.embeddings import CodeEmbedder"
          python -c "from backend.ai.store_factory import create_vector_store"
          python -c "from backend.ai.llm_factory import create_llm"
          python -c "from backend.graph.graph_store_factory import create_graph_store"
          python -c "from backend.git.git_risk_analyzer import GitRiskAnalyzer"

      - name: Test parsing pipeline
        run: |
          python -c "
          from backend.parsing import scan_repository, get_all_entities
          files = scan_repository('dummy_repo')
          entities = get_all_entities(files)
          assert len(entities) > 0, 'No entities parsed'
          print(f'Parsed {len(entities)} entities from dummy_repo')
          "

      - name: Test graph construction
        run: |
          python -c "
          import json
          from backend.graph import build_dependency_graph
          with open('repo_graph.json') as f:
              data = json.load(f)
          cg = build_dependency_graph(data)
          assert cg.store.number_of_nodes() > 0, 'No nodes in graph'
          print(f'Graph: {cg.store.number_of_nodes()} nodes, {cg.store.number_of_edges()} edges')
          "

  # ─────────────────────────────────────────
  # Docker: Build image (on main only)
  # ─────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t synapse-backend:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker run -d --name test-container -p 8000:8000 \
            -e GOOGLE_API_KEY=test \
            synapse-backend:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/ || (docker logs test-container && exit 1)
          docker stop test-container

  # ─────────────────────────────────────────
  # Frontend: Build & Typecheck
  # ─────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ─────────────────────────────────────────
  # TUI: Typecheck
  # ─────────────────────────────────────────
  tui:
    name: TUI CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install core dependencies
        run: npm install
        working-directory: packages/core

      - name: Build core
        run: npm run build
        working-directory: packages/core

      - name: Install TUI dependencies
        run: npm install
        working-directory: packages/tui

      - name: Typecheck TUI
        run: npm run typecheck
        working-directory: packages/tui
